# ── Kubernetes Manifest — Order Service ────────────────────────────
# Same structure as Product Service, but notice the env var:
# PRODUCT_SERVICE_URL points to "http://product-service:5001".
# "product-service" is the DNS name created by the Product Service's
# ClusterIP Service. This is how K8s acts as the "phonebook."

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: <DOCKERHUB_USERNAME>/order-service:latest
          ports:
            - containerPort: 5002
          env:
            # ── Inter-service communication via K8s DNS ──────────
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:5001"
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ── ClusterIP Service (internal) ──────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
  type: ClusterIP

---
# ── NodePort Service (external access) ────────────────────────────
# A NodePort exposes the service on a static port on every node.
# This lets you test from outside the cluster:
#   curl http://<NODE_IP>:30002/orders
apiVersion: v1
kind: Service
metadata:
  name: order-service-external
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
      nodePort: 30002        # Fixed port on the node
  type: NodePort
