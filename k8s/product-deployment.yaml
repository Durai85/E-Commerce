# ── Kubernetes Manifest — Product Service ──────────────────────────
# This single file contains TWO Kubernetes objects separated by "---".
#
# Key Concepts:
# - Deployment: tells K8s "run N copies (replicas) of this container
#   and keep them running." If one crashes, K8s restarts it.
# - Service (ClusterIP): creates a stable internal DNS name
#   ("product-service") so other pods can find this deployment.
#   ClusterIP = only reachable from inside the cluster.
# - Labels/Selectors: K8s uses labels (key-value pairs) to connect
#   Services to the right Deployments.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  replicas: 2         # Run 2 copies for basic high availability
  selector:
    matchLabels:
      app: product-service   # "manage pods with this label"
  template:                  # Template for creating pods
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: <DOCKERHUB_USERNAME>/product-service:latest
          ports:
            - containerPort: 5001
          # Liveness probe — K8s pings /health every 10s.
          # If it fails 3 times, K8s restarts the container.
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
          # Readiness probe — K8s only sends traffic to this pod
          # once /health returns 200.
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ── ClusterIP Service ─────────────────────────────────────────────
# Other services inside the cluster can reach this at:
#   http://product-service:5001
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service     # Route traffic to pods with this label
  ports:
    - protocol: TCP
      port: 5001             # Port the Service listens on
      targetPort: 5001       # Port the container listens on
  type: ClusterIP            # Internal only
