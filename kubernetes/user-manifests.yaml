# ── kubernetes/user-manifests.yaml ───────────────────────────────────────────
# Kubernetes manifests for the User Service.
# Contains TWO resources separated by "---":
#   1. Deployment  – manages the running Pods
#   2. Service     – gives the Deployment a stable internal DNS name
#
# Apply with: kubectl apply -f kubernetes/user-manifests.yaml
# ─────────────────────────────────────────────────────────────────────────────


# ══════════════════════════════════════════════════════════════════════════════
# RESOURCE 1: Deployment
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
    tier: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service
        tier: backend

    spec:
      containers:
        - name: user-service
          image: durai85/user-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5003

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3


# ══════════════════════════════════════════════════════════════════════════════
# RESOURCE 2: Service (ClusterIP)
# Reachable inside the cluster at http://user-service (port 80 → 5003)
# ══════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app: user-service

spec:
  type: ClusterIP

  selector:
    app: user-service

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5003
