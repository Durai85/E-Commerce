# ── kubernetes/nodeport-services.yaml ────────────────────────────────────────
# Fixed NodePort services for external access.
# Used in Codespaces and local k3d deployments.
# Ports map to the k3d cluster port bindings defined in .devcontainer/setup.sh
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: product-nodeport
spec:
  type: NodePort
  selector:
    app: product-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
      nodePort: 30001
---
apiVersion: v1
kind: Service
metadata:
  name: order-nodeport
spec:
  type: NodePort
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
      nodePort: 30002
---
apiVersion: v1
kind: Service
metadata:
  name: user-nodeport
spec:
  type: NodePort
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
      nodePort: 30003
