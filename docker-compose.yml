# ── Docker Compose — Local Orchestration ───────────────────────────
# docker-compose.yml defines how to run multiple containers together.
#
# Key Concepts:
# - "services" = containers you want to run
# - Docker Compose creates a shared network automatically, so
#   containers can reach each other by service name (e.g.,
#   "product-service" resolves to that container's IP).
# - "depends_on" ensures the Product Service starts before
#   the Order Service (but doesn't wait for it to be "ready").

version: "3.8"

services:
  # ── Product Service ────────────────────────────────────────────
  product-service:
    build:
      context: ./product_service     # path to the Dockerfile
    ports:
      - "5001:5001"                  # host:container
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Order Service ──────────────────────────────────────────────
  order-service:
    build:
      context: ./order_service
    ports:
      - "5002:5002"
    environment:
      # This is how the Order Service knows where to find the
      # Product Service. "product-service" is the Docker DNS name
      # for the container defined above.
      - PRODUCT_SERVICE_URL=http://product-service:5001
    depends_on:
      - product-service
